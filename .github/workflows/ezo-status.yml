name: EZO addon status

on:
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: "Type PUBLISH to send to Discord. Any other value runs a dry run only."
        required: true
        default: "DRY_RUN"

jobs:
  publish-status:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish addon status to Discord
        shell: pwsh
        env:
          EZO_CODEX_STATUS: ${{ secrets.EZO_CODEX_STATUS }}
          EZO_CODEX_STATUS_CHANNEL_ID: ${{ vars.EZO_CODEX_STATUS_CHANNEL_ID }}
          CODEX_LOG: ${{ secrets.CODEX_LOG }}
          CODEX_LOG_CHANNEL_ID: ${{ vars.CODEX_LOG_CHANNEL_ID }}
          EZO_CONFIRM_PUBLISH: ${{ inputs.confirm_publish }}
        run: |
          $publish = "$env:EZO_CONFIRM_PUBLISH" -eq "PUBLISH"
          .\scripts\ezo\publish-status.ps1 -PublishCodexLog -DryRun:(!$publish)
